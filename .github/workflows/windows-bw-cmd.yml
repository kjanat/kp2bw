# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Windows bw .cmd
on:
  workflow_call:
  workflow_dispatch:
  pull_request: { paths-ignore: ["**/*.md", ".dprint.jsonc", "**/*docker*"] }
  push: { branches: [master], paths-ignore: ["**/*.md", ".dprint.jsonc", "**/*docker*"] }
jobs:
  cmd-shim:
    runs-on: windows-latest
    permissions: { contents: read }
    timeout-minutes: 15
    strategy: { matrix: { pm: [npm, bun] } }
    defaults: { run: { shell: pwsh } }
    steps:
      - { uses: actions/checkout@v6.0.3, with: { persist-credentials: false } }
      - { uses: oven-sh/setup-bun@v2, if: matrix.pm == 'bun' }
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync

      # windows-latest ships Node + npm preinstalled, so no setup-node action is
      # needed. npm/bun global installs ship bw.cmd + bw.ps1 (no bw.exe).
      - name: Install Bitwarden CLI via npm
        run: "& '${{ matrix.pm }}' install -g @bitwarden/cli"

      # Diagnostic only: PowerShell's Get-Command prefers bw.ps1, but kp2bw uses
      # Python's shutil.which (PATHEXT-aware), which resolves bw.cmd. The smoke
      # test below is the actual gate via resolve_bw_command.
      - name: Diagnose how bw resolves
        run: |
          $log = @"
          PATHEXT = $env:PATHEXT`n
          $(Get-Command bw -All | Format-Table CommandType, Name, Source -AutoSize | Out-String)

          ``````python
          shutil.which("bw") = $(& python -c 'import shutil; print(shutil.which("bw"))' | Out-String -NoNewline)
          ``````
          "@; $log | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          $log

      - name: Run Windows bw .cmd smoke test
        env: { KP2BW_RUN_WIN_CMD_SMOKE: 1 }
        run: uv run tests/windows_bw_cmd_smoke.py
